<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dilemmas Digital Solutions</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("/static/assets/bg.jpeg") no-repeat center center/cover;
            position: relative;
        }

   
    

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 360px;
            padding: 40px 30px;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 30px rgba(0,255,0,0.25);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .login-box img {
            width: 80px;
            margin-bottom: 15px;
        }

        .login-box h2 {
            color: #33ff00;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 14px;
        }

        .login-box input::placeholder {
            color: #ccc;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #33ff00;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #28cc00;
            transform: scale(1.03);
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

   
    <form class="login-box" method="POST" action="/admin">

        <img src="/static/assets/logo.png" alt="DDS Logo">

        <h2>Admin Login</h2>

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

    </form>

</body>
</html>
